<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THOR 索而 · 选品系统</title>
<link rel="stylesheet" href="_shared/design-tokens.css">
<link rel="stylesheet" href="_shared/app-shell.css">
<link rel="stylesheet" href="_shared/dd-components.css">
<link rel="stylesheet" href="_shared/skins/marketing.css">
<script src="data.js"></script>
<script src="js/shared.js"></script>
</head>
<body>
<div class="app-shell">
<header class="app-topbar">
  <div class="app-topbar-inner">
    <a class="app-brand" href="index.html">
      <div class="app-brand-mark">TH</div>
      <div class="app-brand-text"><strong>THOR 选品</strong><span id="catLabel">柜体</span></div>
    </a>
    <nav class="app-nav">
      <a href="index.html">报价单</a>
      <a href="selector.html" class="active">选品</a>
      <a href="dashboard.html">看板</a>
    </nav>
    <button class="shop-back-btn" onclick="backToQuote()" title="返回报价单">← 返回报价</button>
  </div>
</header>

<main class="app-main shop-main dd-app">

  <!-- 已选清单（参考 DD 收藏区） -->
  <div class="dd-card" id="selectionCard">
    <div class="dd-card-hd">
      <span>已选清单</span>
      <button type="button" class="more" id="selectionToggle" onclick="toggleSelection()">收起</button>
    </div>
    <div class="dd-selection-grid" id="selectionGrid"></div>
    <div class="dd-selection-empty" id="selectionEmpty">尚未添加产品，点击卡片或详情页加入</div>
    <div class="dd-selection-summary" id="selectionSummary" style="display:none">
      <span>已选 <strong id="selectedCount">0</strong> 件</span>
      <span>合计 <span class="total" id="selectedTotal">¥0</span></span>
    </div>
  </div>

  <!-- 筛选行（参考 DD collapsible filter） -->
  <div class="dd-card dd-filter" id="filterCard" onclick="if(window.innerWidth<=768&&!event.target.closest('.dd-pill,.dd-search,.dd-filter-search-btn'))toggleFilter()">
    <div class="dd-filter-row">
      <span class="dd-filter-label">筛选</span>
      <div class="dd-filter-tags" id="activeFilterTag">
        <span class="dd-filter-tag" id="activeCatTag">柜体</span>
      </div>
      <button type="button" class="dd-filter-search-btn" onclick="focusSearch(event)" aria-label="搜索">搜索</button>
    </div>
    <div class="dd-filter-panel">
      <div class="dd-pills" id="catNav"></div>
      <input class="dd-search" id="searchInput" placeholder="搜索产品名称、编号..." oninput="filterProducts()">
    </div>
  </div>

  <!-- 选品结果 -->
  <div class="dd-results-hd">
    <h2>选品结果</h2>
    <span class="dd-results-count" id="productCount">共 0 个产品</span>
  </div>

  <div class="dd-card" style="padding:16px">
    <div class="product-grid" id="productGrid"></div>
  </div>

</main>
</div>

<!-- 详情浮层 -->
<div class="overlay" id="detailOverlay" onclick="if(event.target===this)closeDetail()">
  <div class="detail" id="detailCard">
    <div class="img-main" id="detailImg">
      <img id="detailMainImg" src="" alt="">
      <button class="nav prev" onclick="changeImage(-1)">‹</button>
      <button class="nav next" onclick="changeImage(1)">›</button>
      <button class="close" onclick="closeDetail()">✕</button>
    </div>
    <div class="body" id="detailBody">
      <h2 id="detailName"></h2>
      <div class="code" id="detailCode"></div>
      <div class="meta" id="detailMeta"></div>
      <div id="detailScenes"></div>
      <button class="add-btn" onclick="addToQuote()">＋ 加入报价单</button>
    </div>
  </div>
</div>

<script>
var CATEGORIES = [
  { id:'cabinet', name:'柜体', icon:'🗄️' },
  { id:'door', name:'柜门', icon:'🚪' },
  { id:'countertop', name:'台面', icon:'🔲' },
  { id:'hardware', name:'功能配件', icon:'🔩' },
  { id:'sink', name:'水槽/龙头', icon:'🚰' },
  { id:'electric', name:'电器', icon:'⚡' },
  { id:'extra', name:'增加项目', icon:'📋' }
];

var ALL_PRODUCTS = ThorShared.buildSelectorProducts(THOR_DATA);
var currentCat = 'cabinet';
var currentDetail = null;
var detailImages = [];
var detailImgIdx = 0;
var selectedProducts = [];
var selectionCollapsed = false;

function init() {
  renderNav();
  renderGrid();
  renderSelection();
}

function renderNav() {
  var html = '';
  CATEGORIES.forEach(function(c){
    html += '<button type="button" class="dd-pill' + (c.id === currentCat ? ' active' : '') + '" onclick="switchCat(\'' + c.id + '\')">' + c.icon + ' ' + c.name + '</button>';
  });
  document.getElementById('catNav').innerHTML = html;
  var catName = CATEGORIES.find(function(c){ return c.id === currentCat; }).name;
  document.getElementById('catLabel').textContent = catName;
  document.getElementById('activeCatTag').textContent = catName;
}

function switchCat(cat) {
  currentCat = cat;
  document.getElementById('searchInput').value = '';
  renderNav();
  renderGrid();
  if (window.innerWidth <= 768) {
    document.getElementById('filterCard').classList.remove('is-open');
  }
}

function filterProducts() {
  renderGrid();
}

function getProducts() {
  var q = document.getElementById('searchInput').value.toLowerCase();
  return ALL_PRODUCTS.filter(function(p){
    if (p.category !== currentCat) return false;
    if (!q) return true;
    return p.name.toLowerCase().includes(q) || p.id.toLowerCase().includes(q);
  });
}

function renderGrid() {
  var list = getProducts();
  document.getElementById('productCount').textContent = '共 ' + list.length + ' 个产品';
  if (list.length === 0) {
    document.getElementById('productGrid').innerHTML = '<div class="empty"><div class="icon">🔍</div><p>没有找到匹配的产品</p><p>试试切换品类或修改搜索词</p></div>';
    return;
  }
  var html = '';
  list.forEach(function(p){
    var img = p.images && p.images[0]
      ? '<img src="' + p.images[0] + '" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'"><div class="placeholder" style="display:none">📷</div>'
      : '<div class="placeholder">📷</div>';
    var priceSuffix = p.category === 'door' ? '/㎡' : '';
    html += '<div class="product-card" onclick="showDetail(\'' + p.id + '\')">' +
      '<div class="img-wrap">' + img + '</div>' +
      '<div class="info">' +
      '<div class="code">' + p.id + '</div>' +
      '<div class="name">' + p.name + '</div>' +
      '<div class="spec">' + p.dim + '</div>' +
      '<div class="price">¥' + p.price.toFixed(0) + priceSuffix + '</div>' +
      '</div></div>';
  });
  document.getElementById('productGrid').innerHTML = html;
}

function renderSelection() {
  var grid = document.getElementById('selectionGrid');
  var empty = document.getElementById('selectionEmpty');
  var summary = document.getElementById('selectionSummary');
  var total = 0;

  if (selectedProducts.length === 0) {
    grid.innerHTML = '';
    empty.style.display = '';
    summary.style.display = 'none';
    grid.classList.add('collapsed');
    return;
  }

  empty.style.display = 'none';
  summary.style.display = '';
  grid.classList.toggle('collapsed', selectionCollapsed);

  var html = '';
  selectedProducts.forEach(function(p, i){
    total += p.price || 0;
    html += '<div class="dd-selection-item" onclick="showDetail(\'' + p.id + '\')">' +
      '<button type="button" class="sel-remove" onclick="removeSelection(' + i + ', event)" aria-label="移除">✕</button>' +
      '<div class="sel-thumb">📦</div>' +
      '<div class="sel-info">' +
      '<div class="sel-name">' + p.name + '</div>' +
      '<div class="sel-price">¥' + p.price.toFixed(0) + (p.category === 'door' ? '/㎡' : '') + '</div>' +
      '</div></div>';
  });

  grid.innerHTML = html;
  document.getElementById('selectedCount').textContent = selectedProducts.length;
  document.getElementById('selectedTotal').textContent = '¥' + total.toFixed(0);
}

function removeSelection(index, ev) {
  if (ev) ev.stopPropagation();
  selectedProducts.splice(index, 1);
  renderSelection();
}

function toggleSelection() {
  selectionCollapsed = !selectionCollapsed;
  document.getElementById('selectionGrid').classList.toggle('collapsed', selectionCollapsed);
  document.getElementById('selectionToggle').textContent = selectionCollapsed ? '展开' : '收起';
}

function toggleFilter() {
  document.getElementById('filterCard').classList.toggle('is-open');
}

function focusSearch(ev) {
  if (ev) ev.stopPropagation();
  var card = document.getElementById('filterCard');
  card.classList.add('is-open');
  var input = document.getElementById('searchInput');
  input.focus();
  input.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function showDetail(id) {
  var p = ALL_PRODUCTS.find(function(x){ return x.id === id; });
  if (!p) return;
  currentDetail = p;
  document.getElementById('detailName').textContent = p.name;
  document.getElementById('detailCode').textContent = p.id + ' | ' + p.dim;
  document.getElementById('detailMeta').innerHTML =
    '<dt>材料</dt><dd>' + (p.material || '—') + '</dd>' +
    '<dt>颜色</dt><dd>' + (p.color || '—') + '</dd>' +
    '<dt>系列</dt><dd>' + (p.series || '—') + '</dd>' +
    '<dt>单价</dt><dd style="font-size:var(--fs-h2);font-weight:700;color:var(--accent)">¥' + p.price.toFixed(0) + (p.category === 'door' ? '/㎡' : '') + '</dd>';
  detailImages = p.images && p.images.length ? p.images : [];
  detailImgIdx = 0;
  updateDetailImage();
  document.getElementById('detailScenes').innerHTML = p.scenes && p.scenes.length ?
    '<div class="scene-title">使用场景</div><div class="scene-grid">' + p.scenes.map(function(s){ return '<img src="' + s + '" onerror="this.style.display=\'none\'">'; }).join('') + '</div>' : '';
  document.getElementById('detailOverlay').classList.add('open');
}

function updateDetailImage() {
  var img = document.getElementById('detailMainImg');
  if (detailImages.length > 0) {
    img.src = detailImages[detailImgIdx];
    img.style.display = '';
  } else {
    img.style.display = 'none';
  }
}

function changeImage(dir) {
  if (detailImages.length < 2) return;
  detailImgIdx = (detailImgIdx + dir + detailImages.length) % detailImages.length;
  updateDetailImage();
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('open');
}

function addToQuote() {
  if (!currentDetail) return;
  selectedProducts.push(currentDetail);
  renderSelection();
  var btn = document.querySelector('.add-btn');
  btn.textContent = '✅ 已加入 (' + selectedProducts.length + ')';
  setTimeout(function(){ btn.textContent = '＋ 加入报价单'; }, 1500);
}

function backToQuote() {
  if (selectedProducts.length > 0) {
    localStorage.setItem('thorSelections', JSON.stringify(selectedProducts));
  }
  window.location.href = 'index.html';
}

init();
</script>
</body>
</html>
