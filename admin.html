<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>用户管理 - THOR 报价系统</title>
<link rel="stylesheet" href="_shared/design-tokens.css" />
<link rel="stylesheet" href="_shared/app-shell.css" />
<link rel="stylesheet" href="_shared/skins/production.css" />
<script src="api.js"></script>
<link rel="stylesheet" href="_shared/dd-components.css" />
<style>
.page-title { margin-bottom: 20px; }
.page-title h1 { font-size: var(--fs-h1); font-weight: 800; margin: 0; line-height: var(--lh-tight); }
.page-title p { font-size: var(--fs-secondary); color: var(--n-400); margin-top: 4px; }
table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: var(--radius-dd-md); overflow: hidden; box-shadow: var(--shadow-card); border: 1px solid var(--border); }
th, td { padding: 12px 16px; border-bottom: 1px solid var(--border); text-align: left; font-size: var(--fs-secondary); }
th { background: var(--n-50); font-weight: 700; color: var(--n-500); font-size: var(--fs-caption); }
tr:last-child td { border-bottom: none; }
tr:hover td { background: oklch(98% 0.01 195 / 0.4); }
.role { display: inline-block; padding: 3px 10px; border-radius: var(--r-full); font-size: var(--fs-micro); font-weight: 700; background: var(--accent-lt); color: var(--accent); }
.btn-del { padding: 5px 12px; border: 1px solid var(--red-lt); border-radius: var(--r-full); background: var(--surface); color: var(--red); cursor: pointer; font-size: var(--fs-caption); font-weight: 600; font-family: inherit; }
.btn-del:hover { background: var(--red-bg); }
@media(max-width:768px){ table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch} }
</style>
</head>
<body>
<div class="app-shell">
<header class="app-topbar">
  <div class="app-topbar-inner">
    <a class="app-brand" href="index.html">
      <div class="app-brand-mark">TH</div>
      <div class="app-brand-text"><strong>THOR 索而</strong><span>用户管理</span></div>
    </a>
    <nav class="app-nav">
      <a href="index.html">报价单</a>
      <a href="selector.html">选品</a>
      <a href="dashboard.html">看板</a>
      <a href="login.html">登录</a>
    </nav>
  </div>
</header>
<main class="app-main">
<div class="page-title">
  <h1>👥 用户管理</h1>
  <p>L4 超级管理员 · 演示数据</p>
</div>
<table id="user-table">
<thead>
<tr><th>#</th><th>姓名</th><th>角色</th><th>门店</th><th>登录时间</th><th>操作</th></tr>
</thead>
<tbody></tbody>
</table>
</main>
</div>

<script>
var mockUsers = [
  { name: '管理员', role: 'L4', store: '总部', loginAt: '2026-06-18' },
  { name: '张三', role: 'L1', store: '门店A', loginAt: '2026-06-17' },
  { name: '李四', role: 'L2', store: '门店B', loginAt: '2026-06-16' }
];

if (!localStorage.getItem('mockUsers')) {
  localStorage.setItem('mockUsers', JSON.stringify(mockUsers));
}

var users = JSON.parse(localStorage.getItem('mockUsers'));
var tbody = document.querySelector('#user-table tbody');

function renderUsers() {
  tbody.innerHTML = '';
  users.forEach(function (u, i) {
    var tr = document.createElement('tr');
    tr.innerHTML =
      '<td>' + (i + 1) + '</td>' +
      '<td>' + u.name + '</td>' +
      '<td><span class="role">' + u.role + '</span></td>' +
      '<td>' + u.store + '</td>' +
      '<td>' + u.loginAt + '</td>' +
      '<td><button class="btn-del" data-id="' + i + '">删除</button></td>';
    tbody.appendChild(tr);
  });
}

tbody.addEventListener('click', function (e) {
  if (!e.target.classList.contains('btn-del')) return;
  var i = parseInt(e.target.getAttribute('data-id'), 10);
  if (confirm('删除用户 "' + users[i].name + '"？')) {
    users.splice(i, 1);
    localStorage.setItem('mockUsers', JSON.stringify(users));
    renderUsers();
  }
});

renderUsers();
</script>
</body>
</html>
