<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THOR · 登录</title>
<link rel="stylesheet" href="_shared/design-tokens.css">
<link rel="stylesheet" href="_shared/app-shell.css">
<script src="api.js"></script>
<style>
body {
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  background: var(--bg-app);
  background-image:
    radial-gradient(ellipse 80% 60% at 20% 0%, oklch(52% 0.13 195 / 0.12), transparent),
    radial-gradient(ellipse 60% 50% at 90% 100%, oklch(45% 0.12 250 / 0.08), transparent);
}
.login-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px 16px;
}
.login {
  background: var(--surface);
  padding: clamp(28px, 5vw, 40px);
  border-radius: var(--radius-dd-md);
  box-shadow: var(--shadow-card);
  border: 1px solid oklch(100% 0 0 / 0.6);
  border-top: 2px solid oklch(100% 0 0 / 0.9);
  max-width: 400px;
  width: 100%;
}
.login-brand {
  text-align: center;
  margin-bottom: 28px;
}
.login-brand .mark {
  width: 48px;
  height: 48px;
  margin: 0 auto 12px;
  border-radius: var(--r-md);
  background: linear-gradient(135deg, var(--accent), oklch(45% 0.12 250));
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: var(--fs-body-sm);
  box-shadow: 0 4px 16px var(--accent-glow);
}
.login-brand h1 { font-size: var(--fs-h1); font-weight: 800; color: var(--n-900); margin: 0; line-height: var(--lh-tight); }
.login-brand p { font-size: var(--fs-label); color: var(--n-400); margin-top: 4px; }
.field { margin-bottom: 14px; }
.field label { font-size: var(--fs-caption); font-weight: 700; color: var(--n-500); display: block; margin-bottom: 6px; letter-spacing: 0.3px; }
.field input {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-dd-sm);
  font-size: var(--fs-body-sm);
  outline: none;
  background: var(--surface-2);
  transition: all var(--dur-fast);
}
.field input:focus {
  border-color: var(--accent);
  background: var(--surface);
  box-shadow: 0 0 0 3px var(--accent-lt);
}
.role-label { font-size: var(--fs-caption); color: var(--n-400); margin-bottom: 10px; font-weight: 600; }
.role-select { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
.role-select button {
  padding: 10px 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius-dd-sm);
  background: var(--surface);
  cursor: pointer;
  font-size: var(--fs-label);
  font-weight: 600;
  color: var(--n-500);
  transition: all var(--dur-fast);
}
.role-select button:hover { border-color: var(--accent); color: var(--accent); }
.role-select button.active {
  border-color: var(--accent);
  background: var(--accent-lt);
  color: var(--accent-hover);
  box-shadow: 0 0 0 1px var(--accent);
}
.btn-login {
  width: 100%;
  padding: 14px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--r-full);
  font-size: var(--fs-body);
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 4px 16px var(--accent-glow);
  transition: all var(--dur-fast);
}
.btn-login:hover { background: var(--accent-hover); }
.btn-login:disabled { opacity: 0.6; cursor: wait; }
.roles-desc {
  margin-top: 20px;
  padding: 14px 16px;
  background: var(--surface-2);
  border-radius: var(--r-md);
  border: 1px solid var(--border);
  font-size: var(--fs-caption);
  line-height: var(--lh-loose);
  color: var(--n-500);
}
.roles-desc strong { color: var(--n-800); display: block; margin-top: 6px; }
.roles-desc strong:first-child { margin-top: 0; }
.back-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin: 16px auto 0;
  padding: 8px 16px;
  font-size: var(--fs-label);
  font-weight: 600;
  color: var(--n-500);
  text-decoration: none;
  border-radius: var(--r-full);
}
.back-link:hover { color: var(--accent); background: var(--accent-lt); }
</style>
</head>
<body>
<div class="app-shell">
<header class="app-topbar">
  <div class="app-topbar-inner">
    <a class="app-brand" href="index.html">
      <div class="app-brand-mark">TH</div>
      <div class="app-brand-text"><strong>THOR 索而</strong><span>登录</span></div>
    </a>
    <nav class="app-nav">
      <a href="index.html">报价单</a>
      <a href="selector.html">选品</a>
      <a href="dashboard.html">看板</a>
      <a href="login.html" class="active">登录</a>
    </nav>
  </div>
</header>
<div class="login-wrap">
<div class="login">
  <div class="login-brand">
    <div class="mark">TH</div>
    <h1>欢迎回来</h1>
    <p>索而智能家居 · 报价系统</p>
  </div>
  <div class="field">
    <label>账号</label>
    <input id="loginUser" placeholder="管理员账号" value="admin">
  </div>
  <div class="field">
    <label>密码</label>
    <input type="password" id="loginPass" placeholder="密码" value="123456">
  </div>
  <div class="role-label">选择权限等级（演示）</div>
  <div class="role-select" id="roleSelect">
    <button class="active" data-role="L1" onclick="selectRole(this)">L1 销售</button>
    <button data-role="L2" onclick="selectRole(this)">L2 主管</button>
    <button data-role="L3" onclick="selectRole(this)">L3 老板</button>
    <button data-role="L4" onclick="selectRole(this)">L4 超管</button>
  </div>
  <button class="btn-login" onclick="login()">登 录</button>
  <div class="roles-desc">
    <strong>L1 销售</strong> 查产品库 · 做报价 · 看自己历史
    <strong>L2 主管</strong> 看全部报价 · 看出厂价 · 门店统计
    <strong>L3 老板</strong> 管理产品库 · 定价策略 · 用户管理
    <strong>L4 超级管理员</strong> 系统配置 · 日志 · 数据导出
  </div>
  <a class="back-link" href="index.html">← 跳过登录，直接进入报价单</a>
</div>
</div>
</div>
<script>
function selectRole(el) {
  document.querySelectorAll('#roleSelect button').forEach(function(b){b.classList.remove('active')});
  el.classList.add('active');
}
async function login() {
  var role = document.querySelector('#roleSelect button.active').getAttribute('data-role') || 'L1';
  var user = document.getElementById('loginUser').value || '管理员';
  var pass = document.getElementById('loginPass').value || '123456';
  var btn = document.querySelector('.btn-login');
  btn.textContent = '登录中...';
  btn.disabled = true;
  var r = await API.login(user, pass);
  if (r.ok) {
    localStorage.setItem('thorUser', JSON.stringify({name: r.data.name, role: role, loginAt: new Date().toISOString()}));
    window.location.href = 'index.html?login=1';
  } else {
    alert('登录失败: ' + (r.error || '未知错误'));
    btn.textContent = '登 录';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
