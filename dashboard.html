<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THOR · 项目看板</title>
<link rel="stylesheet" href="_shared/design-tokens.css">
<link rel="stylesheet" href="_shared/app-shell.css">
<link rel="stylesheet" href="_shared/skins/production.css">
<style>
body { background: var(--bg-app); }

.page-title { margin-bottom: 20px; }
.page-title h1 { font-size: clamp(20px, 3vw, 24px); font-weight: 800; color: var(--n-900); margin: 0 0 4px; }
.page-title p { font-size: 12px; color: var(--n-400); margin: 0; }

/* ── Stats Cards ── */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,160px),1fr));gap:12px;margin-bottom:20px}
.card{background:var(--surface);border-radius:var(--r-lg);padding:16px 18px;box-shadow:var(--shadow-xs);border:1px solid var(--border);transition:all var(--dur-fast)}
.card:hover{box-shadow:var(--shadow-sm);transform:translateY(-1px)}
.card .num{font-size:clamp(22px,4vw,28px);font-weight:800;color:var(--n-900);line-height:1.2;font-variant-numeric:tabular-nums}
.card .label{font-size:11px;color:var(--n-400);margin-top:4px;font-weight:600}
.card .num.accent{color:var(--accent)}
.card .num.red{color:var(--price)}

/* ── Toolbar ── */
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center;background:var(--surface);padding:12px 16px;border-radius:var(--r-lg);border:1px solid var(--border);box-shadow:var(--shadow-xs)}
.toolbar input{padding:10px 14px;border:1px solid var(--border);border-radius:var(--r-full);font-size:13px;flex:1;min-width:140px;outline:none;background:var(--surface-2)}
.toolbar input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-lt)}
.toolbar select{padding:9px 12px;border:1px solid var(--border);border-radius:var(--r-full);font-size:12px;color:var(--n-600);background:var(--surface)}
.toolbar .sep{width:1px;height:24px;background:var(--border);margin:0 4px}
.btn-tb{padding:9px 16px;border-radius:var(--r-full);cursor:pointer;font-size:12px;border:none;font-weight:700;transition:all var(--dur-fast);white-space:nowrap}
.btn-tb.primary{background:var(--n-800);color:#fff}
.btn-tb.secondary{background:var(--surface);color:var(--n-600);border:1px solid var(--border)}
.btn-tb.accent{background:var(--accent);color:#fff;box-shadow:0 2px 8px var(--accent-glow)}

#tableWrap{background:var(--surface);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow-xs);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--n-50);padding:12px 14px;text-align:left;font-weight:700;color:var(--n-500);font-size:11px;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:12px 14px;border-bottom:1px solid var(--border);color:var(--n-800);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:oklch(98% 0.01 195 / 0.4)}

.status{display:inline-block;padding:3px 10px;border-radius:var(--r-full);font-size:10px;font-weight:700}
.status.draft{background:var(--n-100);color:var(--n-500)}
.status.quoted{background:var(--blue-bg);color:var(--blue)}
.status.confirmed{background:var(--accent-lt);color:var(--accent)}
.status.ordered{background:var(--green-bg);color:var(--green)}

.status-select{border:1px solid var(--border);border-radius:var(--r-sm);padding:4px 8px;font-size:11px;background:var(--surface);cursor:pointer}
.actions{white-space:nowrap}
.actions button{padding:5px 12px;border:1px solid var(--border);border-radius:var(--r-full);background:var(--surface);cursor:pointer;font-size:11px;font-weight:600;color:var(--n-600)}
.actions button:hover{background:var(--n-50)}
.actions button.danger{color:var(--red);border-color:var(--red-lt)}
.actions button.danger:hover{background:var(--red-bg)}

.empty{text-align:center;padding:48px 24px;color:var(--n-400);font-size:14px}
.empty .icon{font-size:42px;margin-bottom:10px}
.empty .sub{font-size:12px;margin-top:6px;color:var(--n-300)}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:var(--r-full);font-size:13px;font-weight:700;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none;box-shadow:var(--shadow-lg)}
.toast.show{opacity:1}
.toast.success{background:var(--n-900);color:#fff}
.toast.warn{background:var(--price);color:#fff}

@media(max-width:768px){
  #tableWrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table{min-width:640px}
  .toolbar{padding:10px 12px}
}
.hidden{display:none}
</style>
</head>
<body>
<div class="app-shell">
<header class="app-topbar">
  <div class="app-topbar-inner">
    <a class="app-brand" href="index.html">
      <div class="app-brand-mark">TH</div>
      <div class="app-brand-text"><strong>THOR 索而</strong><span>项目看板</span></div>
    </a>
    <nav class="app-nav">
      <a href="index.html">报价单</a>
      <a href="selector.html">选品</a>
      <a href="dashboard.html" class="active">看板</a>
      <a href="login.html">登录</a>
    </nav>
    <div class="app-user" id="userInfo"></div>
  </div>
</header>
<main class="app-main">
<div class="page-title">
  <h1>项目看板</h1>
  <p>报价项目管理 · 统计与导出</p>
</div>

<!-- Stats Cards -->
<div class="cards">
  <div class="card"><div class="num" id="statTotal">0</div><div class="label">总项目数</div></div>
  <div class="card"><div class="num accent" id="statMonth">0</div><div class="label">本月报价</div></div>
  <div class="card"><div class="num accent" id="statAmount">¥0</div><div class="label">本月总额</div></div>
  <div class="card"><div class="num red" id="statAvg">¥0</div><div class="label">平均单值</div></div>
  <div class="card"><div class="num" id="statActive">0</div><div class="label">跟进中（草稿+报价）</div></div>
  <div class="card"><div class="num" id="statWin">0</div><div class="label">已成交（确认+下单）</div></div>
</div>

<!-- Toolbar -->
<div class="toolbar">
  <input id="searchInput" placeholder="搜索项目名称、客户..." oninput="renderTable()" style="flex:1;min-width:140px">
  <select id="statusFilter" onchange="renderTable()">
    <option value="">全部状态</option>
    <option value="draft">草稿</option>
    <option value="quoted">已报价</option>
    <option value="confirmed">已确认</option>
    <option value="ordered">已下单</option>
  </select>
  <div class="sep"></div>
  <button class="btn-tb secondary" onclick="renderTable()">🔄 刷新</button>
  <button class="btn-tb primary" onclick="window.location='index.html'">＋ 新建报价</button>
  <button class="btn-tb accent" onclick="exportProjects()">📥 导出</button>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Table -->
<div id="tableWrap">
  <table>
    <thead><tr>
      <th>项目名称</th><th>客户</th><th>金额</th><th>状态</th><th>业务员</th><th>门店</th><th>日期</th><th>操作</th>
    </tr></thead>
    <tbody id="projectRows"></tbody>
  </table>
</div>

<div class="empty" id="emptyState" style="display:none">
  <div class="icon">📋</div>
  <p>暂无项目数据</p>
  <p class="sub">去报价单新建一个项目，或从侧边栏导入</p>
</div>

<script>
function id(s){return document.getElementById(s)}

function showToast(msg, type) {
  var t = id('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type||'success') + ' show';
  clearTimeout(t._timer);
  t._timer = setTimeout(function(){t.classList.remove('show')}, 2200);
}

function init() {
  var u = localStorage.getItem('thorUser');
  var ui = id('userInfo');
  if (u) {
    try{var d=JSON.parse(u);ui.innerHTML = d.name+' · '+d.role+' · <a href="login.html">切换</a>'}
    catch(e){ui.innerHTML='<a href="login.html">登录</a>'}
  } else {
    ui.innerHTML='<a href="login.html">登录</a>';
  }
  renderTable();
}

function getProjects() {
  try{return JSON.parse(localStorage.getItem('thorP')||'[]')}catch(e){return []}
}

function renderTable() {
  var all = getProjects();
  var q = (id('searchInput').value||'').toLowerCase();
  var st = id('statusFilter').value;
  
  // ── Stats: use ALL projects (not filtered) ──
  var now = new Date();
  var thisMonth = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
  var monthTotal = 0, monthCount = 0;
  var activeCount = 0, winCount = 0;
  
  all.forEach(function(p){
    var d = (p.updatedAt||'').slice(0,7);
    var st2 = (p.d||{}).status || 'draft';
    if (d === thisMonth) {
      monthCount++;
      monthTotal += (p.d||{}).totals ? ((p.d.totals.grandTotal||0)) : 0;
    }
    if (st2 === 'draft' || st2 === 'quoted') activeCount++;
    if (st2 === 'confirmed' || st2 === 'ordered') winCount++;
  });
  
  id('statTotal').textContent = all.length;
  id('statMonth').textContent = monthCount;
  id('statAmount').textContent = '¥' + monthTotal.toFixed(0);
  id('statAvg').textContent = '¥' + (monthCount > 0 ? (monthTotal/monthCount).toFixed(0) : '0');
  id('statActive').textContent = activeCount;
  id('statWin').textContent = winCount;
  
  // ── Filter for table display ──
  var filtered = all.filter(function(p){
    if (q) {
      var name = (p.n||'').toLowerCase();
      var cname = ((p.d||{}).customer||{}).name || '';
      if (!name.includes(q) && !cname.toLowerCase().includes(q)) return false;
    }
    if (st) {
      var pst = (p.d||{}).status || 'draft';
      if (pst !== st) return false;
    }
    return true;
  });
  
  // ── Rows ──
  var tbody = id('projectRows');
  var empty = id('emptyState');
  if (all.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    id('tableWrap').style.display = 'none';
    return;
  }
  empty.style.display = 'none';
  id('tableWrap').style.display = '';
  
  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:32px;color:var(--n-400)">没有匹配的项目</td></tr>';
    return;
  }
  
  var statusLabels = {draft:'草稿', quoted:'已报价', confirmed:'已确认', ordered:'已下单'};
  
  tbody.innerHTML = filtered.map(function(p, i){
    var d = p.d || {};
    var c = d.customer || {};
    var t = d.totals || {};
    var date = (p.updatedAt||'').slice(0,10);
    var status = d.status || 'draft';
    // Find original index in ALL projects for status update
    var origIdx = all.indexOf(p);
    return '<tr>' +
      '<td style="font-weight:600">' + (p.n||'未命名') + '</td>' +
      '<td>' + (c.name||'') + '</td>' +
      '<td style="font-weight:700;color:var(--n-900)">¥' + (t.grandTotal||0).toFixed(0) + '</td>' +
      '<td><span class="status ' + status + '">' + (statusLabels[status]||status) + '</span></td>' +
      '<td>' + ((d.order||{}).salesperson||'') + '</td>' +
      '<td>' + ((d.order||{}).store||'') + '</td>' +
      '<td style="color:var(--n-400)">' + date + '</td>' +
      '<td class="actions">' +
        '<select class="status-select" data-idx="' + origIdx + '" onchange="updateStatus(this)">' +
          '<option value="draft"' + (status==='draft'?' selected':'') + '>草稿</option>' +
          '<option value="quoted"' + (status==='quoted'?' selected':'') + '>已报价</option>' +
          '<option value="confirmed"' + (status==='confirmed'?' selected':'') + '>已确认</option>' +
          '<option value="ordered"' + (status==='ordered'?' selected':'') + '>已下单</option>' +
        '</select> ' +
        '<button onclick="loadAndOpen(' + origIdx + ')">📂 打开</button> ' +
        '<button class="danger" onclick="deleteProject(' + origIdx + ')">🗑️</button>' +
      '</td></tr>';
  }).join('');
}

function updateStatus(el) {
  var idx = parseInt(el.getAttribute('data-idx'));
  var newStatus = el.value;
  var all = getProjects();
  if (!all[idx]) return;
  if (!all[idx].d) all[idx].d = {};
  all[idx].d.status = newStatus;
  all[idx].d.updatedAt = new Date().toISOString();
  localStorage.setItem('thorP', JSON.stringify(all));
  renderTable();
  showToast('状态已更新为「' + (el.options[el.selectedIndex].text) + '」');
}

function loadAndOpen(idx) {
  var all = getProjects();
  if (!all[idx]) return;
  localStorage.setItem('thorLoadIdx', idx);
  window.location.href = 'index.html?load=' + idx;
}

function deleteProject(idx) {
  if (!confirm('确定删除？')) return;
  var all = getProjects();
  all.splice(idx, 1);
  localStorage.setItem('thorP', JSON.stringify(all));
  renderTable();
  showToast('已删除');
}

function exportProjects() {
  var all = getProjects();
  if (!all.length) {
    showToast('没有可导出的项目', 'warn');
    return;
  }
  var json = JSON.stringify(all, null, 2);
  var blob = new Blob([json], {type:'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'thor-projects-' + new Date().toISOString().slice(0,10) + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('导出成功 (' + all.length + ' 个项目)');
}

init();
</script>
</main>
</div>
</body>
</html>
